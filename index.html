<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Know Your Rights – Women's Day Quiz</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,700&family=Outfit:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0D0A12;
      --surface: #16111F;
      --card: #1E1729;
      --border: rgba(255, 255, 255, 0.07);
      --magenta: #E0427A;
      --magenta-dim: rgba(224, 66, 122, 0.15);
      --gold: #F0C060;
      --gold-dim: rgba(240, 192, 96, 0.12);
      --teal: #38C4A8;
      --teal-dim: rgba(56, 196, 168, 0.12);
      --text: #F0EBF8;
      --muted: #8A7A98;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      animation: drift 12s ease-in-out infinite alternate;
    }

    .orb1 {
      width: 500px;
      height: 500px;
      background: rgba(224, 66, 122, 0.12);
      top: -150px;
      left: -100px;
    }

    .orb2 {
      width: 400px;
      height: 400px;
      background: rgba(56, 196, 168, 0.08);
      bottom: -100px;
      right: -80px;
      animation-delay: -6s;
    }

    .orb3 {
      width: 300px;
      height: 300px;
      background: rgba(240, 192, 96, 0.06);
      top: 40%;
      left: 40%;
      animation-delay: -3s;
    }

    @keyframes drift {
      from {
        transform: translate(0, 0) scale(1);
      }

      to {
        transform: translate(30px, 20px) scale(1.05);
      }
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 20px 100px;
      position: relative;
      z-index: 1;
    }

    /* HEADER */
    .header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeDown 0.7s ease both;
    }

    .header-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(224, 66, 122, 0.4);
      background: var(--magenta-dim);
      color: var(--magenta);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      padding: 7px 18px;
      border-radius: 99px;
      margin-bottom: 24px;
    }

    .header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 16px;
    }

    .header h1 em {
      font-style: italic;
      color: var(--magenta);
    }

    .header p {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.75;
      max-width: 480px;
      margin: 0 auto;
    }

    /* START */
    .start-screen {
      animation: fadeUp 0.6s ease both;
    }

    .start-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 44px 40px;
      position: relative;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .start-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--magenta), var(--gold), var(--teal));
    }

    .start-card h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.9rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .start-card>p {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 28px;
    }

    .start-meta {
      display: flex;
      gap: 24px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    .meta-item strong {
      color: var(--text);
      font-weight: 600;
    }

    .topic-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 36px;
    }

    .topic-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 13px;
      font-weight: 500;
    }

    .chip-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dp {
      background: var(--magenta);
    }

    .dg {
      background: var(--gold);
    }

    .dt {
      background: var(--teal);
    }

    .start-btn {
      width: 100%;
      padding: 18px;
      background: var(--magenta);
      color: white;
      border: none;
      border-radius: 14px;
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }

    .start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(224, 66, 122, 0.4);
    }

    /* PROGRESS */
    .progress-wrap {
      margin-bottom: 28px;
      animation: fadeDown 0.5s ease both;
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .prog-label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
    }

    .prog-score {
      font-size: 13px;
      font-weight: 600;
      color: var(--gold);
      background: var(--gold-dim);
      padding: 3px 12px;
      border-radius: 99px;
    }

    .prog-bar {
      height: 5px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .prog-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--magenta), var(--gold));
      border-radius: 99px;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .dots-row {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    .q-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      transition: background 0.3s;
    }

    .q-dot.curr-dot {
      background: var(--gold);
      box-shadow: 0 0 8px var(--gold);
    }

    .q-dot.ok {
      background: var(--teal);
    }

    .q-dot.bad {
      background: var(--magenta);
    }

    /* QUESTION CARD */
    .q-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.4s ease both;
    }

    .q-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--magenta), var(--gold));
    }

    .scenario-banner {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--gold-dim);
      border: 1px solid rgba(240, 192, 96, 0.25);
      color: var(--gold);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 99px;
      margin-bottom: 16px;
    }

    .law-banner {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--magenta-dim);
      border: 1px solid rgba(224, 66, 122, 0.25);
      color: var(--magenta);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 99px;
      margin-bottom: 16px;
    }

    .story-box {
      background: rgba(240, 192, 96, 0.06);
      border: 1px solid rgba(240, 192, 96, 0.18);
      border-radius: 14px;
      padding: 18px 20px;
      margin-bottom: 22px;
      font-size: 14.5px;
      line-height: 1.75;
      color: #D8C8E8;
      position: relative;
    }

    .story-box::before {
      content: '"';
      font-family: 'Cormorant Garamond', serif;
      font-size: 4rem;
      color: var(--gold);
      opacity: 0.2;
      position: absolute;
      top: -12px;
      left: 12px;
      line-height: 1;
    }

    .q-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.1rem, 2.5vw, 1.35rem);
      font-weight: 600;
      line-height: 1.55;
      color: var(--text);
      margin-bottom: 26px;
    }

    .options {
      display: grid;
      gap: 11px;
    }

    .opt-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 15px 18px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 14px;
      cursor: pointer;
      text-align: left;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      color: var(--text);
      font-weight: 400;
      transition: all 0.2s;
      line-height: 1.5;
    }

    .opt-btn:hover:not(:disabled) {
      background: var(--magenta-dim);
      border-color: rgba(224, 66, 122, 0.4);
      transform: translateX(4px);
    }

    .opt-letter {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .opt-btn:hover:not(:disabled) .opt-letter {
      background: var(--magenta);
      border-color: var(--magenta);
      color: white;
    }

    .opt-btn.correct {
      background: var(--teal-dim);
      border-color: rgba(56, 196, 168, 0.45);
      color: var(--teal);
    }

    .opt-btn.correct .opt-letter {
      background: var(--teal);
      border-color: var(--teal);
      color: #0D0A12;
    }

    .opt-btn.wrong {
      background: var(--magenta-dim);
      border-color: rgba(224, 66, 122, 0.45);
      color: rgba(224, 66, 122, 0.8);
      opacity: 0.75;
    }

    .opt-btn.wrong .opt-letter {
      background: var(--magenta);
      border-color: var(--magenta);
      color: white;
    }

    .opt-btn:disabled {
      cursor: not-allowed;
    }

    .explanation {
      margin-top: 20px;
      padding: 18px 20px;
      background: rgba(56, 196, 168, 0.07);
      border: 1px solid rgba(56, 196, 168, 0.2);
      border-left: 3px solid var(--teal);
      border-radius: 12px;
      font-size: 13.5px;
      line-height: 1.75;
      color: #B8D8D0;
      animation: fadeUp 0.35s ease;
    }

    .expl-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 7px;
      display: block;
    }

    .verdict {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 14px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .verdict.offence {
      background: rgba(224, 66, 122, 0.15);
      color: #FF8FAF;
      border: 1px solid rgba(224, 66, 122, 0.3);
    }

    .verdict.clear {
      background: rgba(56, 196, 168, 0.12);
      color: var(--teal);
      border: 1px solid rgba(56, 196, 168, 0.3);
    }

    .next-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      margin-top: 20px;
      padding: 15px 28px;
      background: var(--magenta);
      color: white;
      border: none;
      border-radius: 14px;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s;
      animation: fadeUp 0.3s ease;
    }

    .next-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(224, 66, 122, 0.35);
    }

    /* RESULTS */
    .results-screen {
      animation: fadeUp 0.6s ease both;
    }

    .results-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 50px 40px;
      text-align: center;
      position: relative;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .results-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--magenta), var(--gold), var(--teal));
    }

    .score-ring {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      margin: 0 auto 28px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .score-ring svg {
      position: absolute;
      inset: 0;
      transform: rotate(-90deg);
    }

    .ring-bg {
      fill: none;
      stroke: rgba(255, 255, 255, 0.06);
      stroke-width: 8;
    }

    .ring-fill {
      fill: none;
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .score-inner {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .score-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3.2rem;
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
    }

    .score-denom {
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
    }

    .results-emoji {
      font-size: 2.5rem;
      margin-bottom: 8px;
    }

    .results-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .results-msg {
      font-size: 14.5px;
      color: var(--muted);
      line-height: 1.75;
      max-width: 420px;
      margin: 0 auto 36px;
    }

    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 36px;
    }

    .stat-box {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 12px;
    }

    .stat-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-num.green {
      color: var(--teal);
    }

    .stat-num.red {
      color: var(--magenta);
    }

    .stat-num.gold {
      color: var(--gold);
    }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
    }

    .secondary-btn {
      width: 100%;
      padding: 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text);
      border-radius: 14px;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      margin-top: 12px;
    }

    .secondary-btn:hover {
      background: rgba(255, 255, 255, 0.09);
      transform: translateY(-1px);
    }

    /* CONFETTI */
    #confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      display: none;
    }

    #confetti.on {
      display: block;
    }

    .cf {
      position: absolute;
      animation: cffall linear forwards;
    }

    @keyframes cffall {
      0% {
        transform: translateY(-20px) rotate(0deg) scale(1);
        opacity: 1;
      }

      100% {
        transform: translateY(105vh) rotate(540deg) scale(0.5);
        opacity: 0;
      }
    }

    /* LOGIN & LEADERBOARD */
    .input-field {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      outline: none;
      transition: all 0.2s;
    }

    .input-field:focus {
      border-color: var(--magenta);
      background: rgba(255, 255, 255, 0.08);
    }

    .leaderboard-section {
      margin-top: 32px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
    }

    .leaderboard-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 16px;
      text-align: center;
    }

    .leaderboard-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      text-align: left;
    }

    .leaderboard-table th,
    .leaderboard-table td {
      padding: 12px 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .leaderboard-table th {
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 11px;
    }

    .leaderboard-table tr:last-child td {
      border-bottom: none;
    }

    .leaderboard-table .highlight {
      color: var(--teal);
      font-weight: 700;
    }

    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media(max-width:560px) {

      .q-card,
      .start-card,
      .results-card {
        padding: 26px 18px;
      }

      .stats-row {
        grid-template-columns: 1fr 1fr;
      }

      .stats-row .stat-box:last-child {
        grid-column: 1/-1;
      }

      .topic-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div id="confetti"></div>

  <div class="wrap">
    <div class="header">
      <div class="header-pill">🎗️ International Women's Day</div>
      <h1>Do You Know<br><em>Your Rights?</em></h1>
      <p>Real situations. Real laws. Find out what's an offence, what's protected, and what you can do about it in
        India.</p>
    </div>
    <div id="root"></div>
  </div>

  <script>
    const Q = [
      {
        type: 'scenario', tag: 'Workplace · POSH Act',
        story: 'Priya\'s manager sends her WhatsApp messages at 11 PM saying "You\'re the most attractive woman in the office" and "I\'d love to take you out." He does this repeatedly. Priya is uncomfortable but has said nothing yet.',
        text: 'Is this sexual harassment under the POSH Act, 2013?',
        opts: ['No — it\'s just flattery; no physical contact happened', 'No — it happened outside office hours so POSH doesn\'t apply', 'Yes — unwelcome verbal or written sexual conduct is covered', 'Only if Priya has formally objected in writing'],
        ans: 2, verdict: 'offence',
        expl: 'POSH covers verbal, written and digital communication of a sexual nature — including late-night messages from a workplace connection. Physical contact is not required. The unwelcome nature and power imbalance make this clear sexual harassment. Priya can file a complaint with the ICC.'
      },
      {
        type: 'scenario', tag: 'Quid Pro Quo · POSH Act',
        story: 'Rohit promises his subordinate Sneha a promotion if she accompanies him on an outstation trip. She refuses. The following month, he gives her the worst appraisal of her career and recommends she be put on a performance improvement plan.',
        text: 'What type of harassment is this, and is it legally actionable?',
        opts: ['No offence — appraisals are a manager\'s prerogative', 'Quid pro quo sexual harassment under POSH Act — yes, fully actionable', 'Only a company HR policy violation, not a legal one', 'Only actionable if she has audio/video evidence'],
        ans: 1, verdict: 'offence',
        expl: '"Quid pro quo" (this for that) harassment — offering career advancement for sexual favours and penalising refusal — is explicitly covered under POSH. It\'s one of the most serious forms of workplace harassment and can lead to termination, fines, and criminal proceedings against the harasser.'
      },
      {
        type: 'scenario', tag: 'Hostile Environment · POSH Act',
        story: 'Every morning, the men in Ananya\'s office discuss women\'s bodies loudly, share crude jokes on the team WhatsApp group, and paste sexualised memes on the pantry notice board. Ananya has not been individually targeted, but finds the environment deeply hostile.',
        text: 'Can Ananya file a POSH complaint even though she wasn\'t directly targeted?',
        opts: ['No — she must be the direct target for a complaint to be valid', 'No — casual banter among colleagues is not covered by law', 'Yes — creating a hostile work environment for women is sexual harassment under POSH', 'Only if at least 5 women co-sign the complaint'],
        ans: 2, verdict: 'offence',
        expl: 'POSH explicitly defines "hostile work environment" as a form of sexual harassment — conduct that humiliates, intimidates or creates a hostile atmosphere for women, even if not directed at one person. Ananya can independently file a complaint with the ICC.'
      },
      {
        type: 'scenario', tag: 'Freelancer · POSH Act',

    let screen = 'login', curr = 0, score = 0, answers = new Array(Q.length).fill(null);
    let userDetails = { name: '', course: '', batch: '' };
    let startTime = null, endTime = null;
    let leaderboard = JSON.parse(localStorage.getItem('poshQuizLeaderboard') || '[]');

    function render() {
      const r = document.getElementById('root');
      if (screen === 'login') r.innerHTML = renderLogin();
      else if (screen === 'start') r.innerHTML = renderStart();
      else if (screen === 'quiz') r.innerHTML = renderQuiz();
      else r.innerHTML = renderResults();
      if (screen === 'results') animateRing();
    }

    function renderLogin() {
      return `<div class="start-screen">
  <div class="start-card">
    <div style="text-align:center; margin-bottom:24px;">

  </div></div>`;
    }

      userDetails = { name: n, course: c, batch: b };
      screen = 'start';
      render();
    }

    function renderStart() {
      return `<div class="start-screen">

    <button class="start-btn" onclick="startQuiz()">Begin Quiz →</button>
  </div></div>`;
    }

    function renderQuiz() {
      const q = Q[curr];
      const answered = answers[curr] !== null;
      const sel = answers[curr];
      const dots = Q.map((_, i) => {
        let c = '';
        if (i === curr) c = 'curr-dot';
        else if (answers[i] !== null) c = answers[i] === Q[i].ans ? 'ok' : 'bad';
        return `<div class="q-dot ${c}"></div>`;
      }).join('');
      const pct = (curr / Q.length) * 100;
      const banner = q.type === 'scenario'
        ? `<div class="scenario-banner">🎭 Real-Life Scenario &nbsp;·&nbsp; ${q.tag}</div>`
        : `<div class="law-banner">⚖️ Law Knowledge &nbsp;·&nbsp; ${q.tag}</div>`;
      const story = q.story ? `<div class="story-box">${q.story}</div>` : '';
      const opts = q.opts.map((o, i) => {
        let c = '';
        if (answered) { if (i === q.ans) c = 'correct'; else if (i === sel && sel !== q.ans) c = 'wrong'; }
        return `<button class="opt-btn ${c}" onclick="pick(${i})" ${answered ? 'disabled' : ''}><span class="opt-letter">${['A', 'B', 'C', 'D'][i]}</span><span>${o}</span></button>`;
      }).join('');
      let vhtml = '';
      if (answered && q.verdict) {
        vhtml = q.verdict === 'offence'
          ? `<div class="verdict offence">🚨 This IS an Offence under Indian Law</div>`
          : `<div class="verdict clear">✅ Not a Criminal Offence (as described)</div>`;
      }
      const expl = answered ? `<div class="explanation">${vhtml}<span class="expl-label">💡 Legal Insight</span>${q.expl}</div>` : '';
      const nxt = answered ? `<button class="next-btn" onclick="nxt()">${curr + 1 < Q.length ? 'Next Question →' : '🏆 See My Results'}</button>` : '';
      return `
  <div class="progress-wrap">
    <div class="progress-top"><span class="prog-label">Question ${curr + 1} of ${Q.length}</span><span class="prog-score">✓ ${score} correct</span></div>
    <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
    <div class="dots-row">${dots}</div>
  </div>
  <div class="q-card">${banner}${story}<div class="q-text">${q.text}</div><div class="options">${opts}</div>${expl}${nxt}</div>`;
    }

    function renderResults() {
      const pct = Math.round((score / Q.length) * 100);
      const wrong = Q.length - score;
      let emoji, title, msg;
      if (pct === 100) { emoji = '🏆'; title = 'Perfect Awareness!'; msg = 'Extraordinary. You know these laws inside out. Your knowledge can directly protect you and the people around you.'; }
      else if (pct >= 75) { emoji = '🌟'; title = 'Strong Awareness!'; msg = 'Excellent grasp of women\'s rights. Knowing these laws helps you recognise violations and support those around you.'; }
      else if (pct >= 50) { emoji = '📚'; title = 'Good Foundation!'; msg = 'You know the basics. Reviewing the scenarios you missed will sharpen your awareness in real-world situations.'; }
      else { emoji = '🌸'; title = 'Keep Learning!'; msg = 'Every question is a chance to learn. These laws are designed to protect you and those around you — explore them further.'; }
      const C = 2 * Math.PI * 54;
      const color = pct >= 75 ? '#38C4A8' : pct >= 50 ? '#F0C060' : '#E0427A';
      return `<div class="results-screen">
  <div class="results-card">
    <div class="score-ring">
      <svg viewBox="0 0 120 120" width="150" height="150">
        <circle class="ring-bg" cx="60" cy="60" r="54"/>

      </svg>
      <div class="score-inner"><div class="score-num">${score}</div><div class="score-denom">out of ${Q.length}</div></div>
    </div>
    <div class="results-emoji">${emoji}</div>
    <div class="results-title">${title}</div>
    <div class="results-msg">${msg}</div>

      <div class="stat-box"><div class="stat-num green">${score}</div><div class="stat-label">✅ Correct</div></div>
      <div class="stat-box"><div class="stat-num red">${wrong}</div><div class="stat-label">❌ Incorrect</div></div>
      <div class="stat-box"><div class="stat-num gold">${pct}%</div><div class="stat-label">Score</div></div>
    </div>
    <div style="margin-bottom:20px; font-size:15px; color:var(--muted); text-align:center;">
        Time Taken: <strong style="color:var(--text);">${formatTime(Math.round((endTime - startTime) / 1000))}</strong>
    </div>
    <button class="start-btn" onclick="restartQuiz()">🔄 Try Again</button>
    <button class="secondary-btn" onclick="reviewAll()">📖 Review All Answers</button>

    <div class="leaderboard-section">
      <div class="leaderboard-title">🏆 Top Performers</div>
      <div style="overflow-x:auto;">
        <table class="leaderboard-table">
          <thead>
            <tr>
              <th>Rank</th>
              <th>Name</th>
              <th>Course &amp; Batch</th>
              <th>Score</th>
              <th>Time</th>
            </tr>
          </thead>
          <tbody>
            ${leaderboard.slice(0, 10).map((entry, idx) => `
              <tr>
                <td>#${idx + 1}</td>
                <td style="font-weight:600;">${entry.name}</td>
                <td style="color:var(--muted);">${entry.course} (${entry.batch})</td>
                <td class="highlight">${entry.score}/${Q.length}</td>
                <td>${formatTime(entry.time)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  </div></div>`;
    }

    function startQuiz() { screen = 'quiz'; curr = 0; score = 0; answers = new Array(Q.length).fill(null); startTime = Date.now(); render(); }
    function pick(i) { if (answers[curr] !== null) return; answers[curr] = i; if (i === Q[curr].ans) score++; render(); }
    function nxt() { if (curr + 1 < Q.length) { curr++; render(); } else { endTime = Date.now(); saveToLeaderboard(); screen = 'results'; render(); } }

    function saveToLeaderboard() {
      const timeTaken = Math.round((endTime - startTime) / 1000);
      leaderboard.push({
        ...userDetails,
        score: score,
        time: timeTaken,
        date: new Date().toISOString()
      });
      leaderboard.sort((a, b) => {
        if (b.score !== a.score) return b.score - a.score;
        return a.time - b.time;
      });
      localStorage.setItem('poshQuizLeaderboard', JSON.stringify(leaderboard));
    }

    function formatTime(secs) {
      const m = Math.floor(secs / 60);
      const s = secs % 60;
      return `${m}m ${s}s`;
    }
    function restartQuiz() { document.getElementById('confetti').className = ''; document.getElementById('confetti').innerHTML = ''; startQuiz(); }

    function reviewAll() {
      const r = document.getElementById('root');
      let html = `<div style="animation:fadeUp 0.5s ease">`;
      Q.forEach((q, qi) => {
        const ua = answers[qi]; const ok = ua === q.ans;
        html += `<div class="q-card" style="margin-bottom:16px;animation:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
        ${q.type === 'scenario' ? `<div class="scenario-banner">🎭 ${q.tag}</div>` : `<div class="law-banner">⚖️ ${q.tag}</div>`}
        <span style="font-size:12px;font-weight:600;color:${ok ? 'var(--teal)' : 'var(--magenta)'}">${ok ? '✅ Correct' : '❌ Incorrect'}</span>
      </div>
      ${q.story ? `<div class="story-box">${q.story}</div>` : ''}
      <div class="q-text" style="margin-bottom:16px">${q.text}</div>
      <div class="options">${q.opts.map((o, i) => {
          let c = i === q.ans ? 'correct' : (i === ua && ua !== q.ans ? 'wrong' : '');
          return `<button class="opt-btn ${c}" disabled><span class="opt-letter">${['A', 'B', 'C', 'D'][i]}</span><span>${o}</span></button>`;
        }).join('')}</div>
      <div class="explanation">
        ${q.verdict ? `<div class="verdict ${q.verdict === 'offence' ? 'offence' : 'clear'}">${q.verdict === 'offence' ? '🚨 This IS an Offence' : '✅ Not a Criminal Offence'}</div>` : ''}
        <span class="expl-label">💡 Legal Insight</span>${q.expl}
      </div>
    </div>`;
      });
      html += `<button class="start-btn" onclick="restartQuiz()" style="display:block;width:100%;margin-top:8px">🔄 Try Again</button></div>`;
      r.innerHTML = html;
    }

    function animateRing() {
      const el = document.getElementById('ring-fill');
      if (!el) return;
      const C = 2 * Math.PI * 54;
      const offset = C * (1 - score / Q.length);
      requestAnimationFrame(() => { setTimeout(() => { el.style.strokeDashoffset = offset; }, 50); });
      if (score / Q.length >= 0.75) launchConfetti();
    }

    function launchConfetti() {
      const el = document.getElementById('confetti');
      el.className = 'on';
      const colors = ['#E0427A', '#F0C060', '#38C4A8', '#B06CFF', '#FF8FAF', '#FDE68A'];
      for (let i = 0; i < 100; i++) {
        const d = document.createElement('div');
        d.className = 'cf';
        const sz = 6 + Math.random() * 8;
        d.style.cssText = `left:${Math.random() * 100}%;top:-10px;width:${sz}px;height:${sz}px;background:${colors[Math.floor(Math.random() * colors.length)]};border-radius:${Math.random() > 0.5 ? '50%' : '3px'};animation-duration:${2.5 + Math.random() * 3}s;animation-delay:${Math.random() * 1.8}s;`;
        el.appendChild(d);
      }
      setTimeout(() => { el.className = ''; el.innerHTML = ''; }, 6500);
    }

    render();
  </script>
</body>

</html>
